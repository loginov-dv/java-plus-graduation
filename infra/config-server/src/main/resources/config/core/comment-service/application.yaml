server:
  port: 0

spring:
  datasource:
    driverClassName: 'org.postgresql.Driver'
    url: 'jdbc:postgresql://localhost:5433/comments_db'
    username: 'ewmuser'
    password: 'ewmpass'
  jpa:
    show_sql: true
    hibernate.ddl-auto: none
    properties.hibernate:
      jdbc.time_zone: UTC
      format_sql: true
  sql.init.mode: always
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

feign:
  client:
    config:
      event-service:
        connectTimeout: 5000
        readTimeout: 10000
        retryer: feign.Retryer.Default
      user-service:
        connectTimeout: 3000
        readTimeout: 5000
        retryer: feign.Retryer.Default

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      failureRateThreshold: 50

logging:
  level:
    root: INFO
    ru.practicum.core.comment: DEBUG