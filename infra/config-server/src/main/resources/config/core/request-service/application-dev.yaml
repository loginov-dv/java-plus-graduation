server:
  port: 0

spring:
  datasource:
    driverClassName: 'org.h2.Driver'
    url: 'jdbc:h2:mem:requests_db'
    username: 'ewmuser'
    password: 'ewmpass'
  jpa:
    show_sql: true
    hibernate.ddl-auto: none
    properties.hibernate:
      dialect: 'org.hibernate.dialect.H2Dialect'
      jdbc.time_zone: UTC
      format_sql: true
  sql.init.mode: always
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

feign:
  client:
    config:
      event-service:
        connectTimeout: 5000
        readTimeout: 10000
        retryer: feign.Retryer.Default
      user-service:
        connectTimeout: 3000
        readTimeout: 5000
        retryer: feign.Retryer.Default

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      failureRateThreshold: 50

logging:
  level:
    root: INFO
    org.springframework:
      orm.jpa:
        JpaTransactionManager: DEBUG
      transaction:
        interceptor: DEBUG
    ru.practicum.core.request: DEBUG