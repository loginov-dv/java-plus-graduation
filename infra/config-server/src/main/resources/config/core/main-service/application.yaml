server:
  port: 0

spring:
  datasource:
    driverClassName: 'org.postgresql.Driver'
    url: 'jdbc:postgresql://localhost:5433/ewm'
    username: 'ewmuser'
    password: 'ewmpass'
  jpa:
    show_sql: true
    hibernate.ddl-auto: none
    properties.hibernate:
      jdbc.time_zone: UTC
      format_sql: true
  sql.init.mode: always

# Stats-server custom properties
stats-server:
  id: 'stats-server'
  retryBackOffPeriod: 10000
  retryMaxAttempts: 5

logging:
  level:
    root: INFO
    ru.practicum.ewm: DEBUG