server:
  port: 0

grpc:
  server:
    port: 0

spring:
  datasource:
    driverClassName: 'org.postgresql.Driver'
    url: 'jdbc:postgresql://localhost:5433/analyzer_db'
    username: 'ewmuser'
    password: 'ewmpass'
  jpa:
    show_sql: true
    hibernate.ddl-auto: none
    properties.hibernate:
      jdbc.time_zone: UTC
      format_sql: true
  sql.init.mode: always

logging:
  level:
    root: INFO
    ru.practicum.stats.analyzer: DEBUG

kafka:
  server: 'localhost:9092'
  topics:
    users: 'stats.user-actions.v1'
    events: 'stats.events-similarity.v1'
  user-consumer:
    client-id: 'user-consumer'
    group-id: 'analyzer.group'
    poll-duration-ms: 5000
  event-consumer:
    client-id: 'event-consumer'
    group-id: 'analyzer.group'
    poll-duration-ms: 5000

action-weights:
  view: 0.4
  register: 0.8
  like: 1