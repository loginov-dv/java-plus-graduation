server:
  port: 0

spring:
  datasource:
    driverClassName: 'org.postgresql.Driver'
    url: 'jdbc:postgresql://localhost:5432/stats'
    username: 'statsuser'
    password: 'statspass'
  jpa:
    show_sql: true
    hibernate.ddl-auto: none
    properties.hibernate:
      jdbc.time_zone: UTC
      format_sql: true
  sql.init.mode: always

logging:
  level:
    root: INFO
    ru.practicum.statserver: DEBUG